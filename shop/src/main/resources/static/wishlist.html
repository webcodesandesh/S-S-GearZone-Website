<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - S.S GearZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>

        :root {
            --bg-color: #0B0501;
            --surface: #161210;
            --surface-raised: #1e1a18;
            --primary: #FF6803;
            --primary-hover: #AE3A02;
            --text-main: #FFFFFF;
            --text-muted: #BFBFBF;
            --border-color: #2a2420;
        }

        
        /* theme.css applied */
        body {
            background-color: var(--bg-color) !important;
            background: var(--bg-color) !important;
            background-attachment: fixed !important;
            font-family: 'Inter', sans-serif !important;
            color: var(--text-muted) !important;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(255, 104, 3, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(174, 58, 2, 0.1) 0%, transparent 50%),
                        rgba(11, 5, 1, 0.85);
            z-index: -1;
            pointer-events: none;
        }
        .navbar-premium { background: var(--surface); border-bottom: 1px solid var(--border-color); padding: 15px 0; }
        .brand-logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;}

        .product-card { background: var(--border-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; text-align: center; position: relative; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { border-color: var(--primary); box-shadow: 0 15px 35px rgba(255, 109, 57, 0.15); transform: translateY(-8px); background: #2a2f40;}
        .card-img { height: 150px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); transition: 0.4s;}
        .product-card:hover .card-img { transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 15px 15px rgba(255, 109, 57, 0.3));}

        .card-title { font-weight: 800; font-size: 1.1rem; color: var(--text-main); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-price { font-weight: 900; color: var(--primary); font-size: 1.2rem; margin-bottom: 15px;}

        .btn-remove { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 50%; width: 35px; height: 35px; color: #f87171; transition: 0.3s; }
        .btn-remove:hover { background: rgba(248, 113, 113, 0.2); transform: scale(1.1); border-color: #f87171;}

        .btn-cart { background: var(--border-color); color: white; border-radius: 12px; font-weight: 800; width: 100%; border: 1px solid var(--border-color); padding: 10px; transition: 0.3s;}
        .product-card:hover .btn-cart { background: var(--primary); border-color: var(--primary); color: white; }
    
        .top-header, .card-custom, .amz-order-card, .dashboard-card, .sidebar, .offcanvas {
            background: var(--surface) !important;
        }
    
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">
<body>

<nav class="navbar navbar-expand-lg navbar-premium mb-5">
    <div class="container">
        <a class="brand-logo" href="index.html"><i class="bi bi-controller"></i> SS STORE</a>
        <div class="ms-auto d-flex gap-2">
            <a href="index.html" class="btn btn-outline-light fw-bold rounded-pill border-secondary"><i class="bi bi-house-door me-2"></i> Armory</a>
            <button class="btn btn-danger fw-bold rounded-pill" onclick="logout()">Sign Out</button>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <h3 class="fw-bold text-white mb-4" style="font-weight: 900; letter-spacing: 1px;">WISHLIST <i class="bi bi-heart-fill ms-2" style="color: var(--primary);"></i></h3>
    <div class="row g-4" id="wishlistGrid">
        <div class="text-center py-5" style="color: var(--text-muted);"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
</div>

<script>
    if (localStorage.getItem("isLoggedIn") !== "true") window.location.href = "login.html";
    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    const userEmail = localStorage.getItem("userEmail");

    function loadWishlist() {
        fetch(`http://localhost:8080/api/wishlist/${userEmail}`)
            .then(res => res.json())
            .then(items => {
                const grid = document.getElementById('wishlistGrid'); grid.innerHTML = '';
                if (items.length === 0) {
                    // YAHAN TEXT WHITE KIYA HAI!
                    grid.innerHTML = `<div class="col-12 text-center py-5"><i class="bi bi-heartbreak fs-1 d-block mb-3" style="color: var(--text-muted);"></i><h4 class="fw-bold text-white">Wishlist empty</h4><a href="index.html" class="btn fw-bold mt-2" style="background:var(--primary); color:white;">Explore Armory</a></div>`;
                    return;
                }
                items.forEach(item => {
                    let product = item.product; let img = (product.images && product.images.length > 0) ? product.images[0] : 'https://via.placeholder.com/200';
                    grid.innerHTML += `
                        <div class="col-lg-3 col-md-4 col-sm-6">
                            <div class="product-card">
                                <button class="btn-remove" onclick="removeFromWishlist(${product.id})" title="Remove"><i class="bi bi-trash3-fill"></i></button>
                                <img src="${img}" class="card-img">
                                <div class="card-title" title="${product.name}">${product.name}</div>
                                <div class="card-price">₹${product.price}</div>
                                <button class="btn-cart" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${img}', ${product.stockQuantity})"><i class="bi bi-cart-plus me-1"></i> Add to Cart</button>
                            </div>
                        </div>`;
                });
            });
    }

    function removeFromWishlist(productId) { fetch(`http://localhost:8080/api/wishlist/toggle?email=${userEmail}&productId=${productId}`, { method: 'POST' }).then(res => loadWishlist()); }
    function addToCart(id, name, price, img, maxStock) {
        if (maxStock <= 0) return alert("Out of stock!");
        let cart = JSON.parse(localStorage.getItem('cart')) || []; let item = cart.find(i => i.id === id);
        if (item) item.quantity = Math.min(item.quantity + 1, maxStock); else cart.push({ id, name, price, image: img, quantity: 1, maxStock });
        localStorage.setItem('cart', JSON.stringify(cart)); alert("Added to loadout!");
    }
    loadWishlist();
</script>
<script src="scroll-animations.js" defer></script>

</html>
