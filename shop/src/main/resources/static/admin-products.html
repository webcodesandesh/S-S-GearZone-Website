<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Products | S/S GearZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>

        :root {
            --bg-color: #0B0501;
            --surface: #161210;
            --surface-raised: #1e1a18;
            --primary: #FF6803;
            --primary-hover: #AE3A02;
            --text-main: #FFFFFF;
            --text-muted: #BFBFBF;
            --border-color: #2a2420;
        }

        
        /* theme.css applied */
        /* ================= CORE THEME ================= */
        body {
            background-color: var(--bg-color) !important;
            background: var(--bg-color) !important;
            background-attachment: fixed !important;
            font-family: 'Inter', sans-serif !important;
            color: var(--text-muted) !important;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(255, 104, 3, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(174, 58, 2, 0.1) 0%, transparent 50%),
                        rgba(11, 5, 1, 0.85);
            z-index: -1;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

        /* ================= TOP NAVBAR (NEW) ================= */
        .admin-header { background: var(--surface); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        .nav-menu { display: flex; gap: 15px; align-items: center; margin: 0; padding: 0; list-style: none; }
        .nav-link { padding: 10px 20px; border-radius: 30px; font-weight: 800; color: var(--text-muted); transition: 0.3s; text-decoration: none; font-size: 0.95rem; }
        .nav-link:hover { background: rgba(255, 104, 3, 0.1); color: var(--primary); transform: translateY(-2px); }
        .nav-link.active { background: var(--primary); color: var(--text-main); box-shadow: 0 5px 15px rgba(255, 109, 57, 0.3); }

        /* ================= MAIN CONTENT ================= */
        .main-content { padding: 40px; min-height: 100vh; max-width: 1400px; margin: 0 auto; }
        .dashboard-container { background: var(--surface); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid var(--border-color); padding: 30px; margin-top: 30px;}

        /* TABLE STYLES */
        .table-custom { border-collapse: separate; border-spacing: 0 10px; width: 100%; color: var(--text-main);}
        .table-custom thead th { border: none; font-weight: 800; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; padding: 15px 20px; }
        .table-custom tbody tr { background: var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; cursor: pointer;}
        .table-custom tbody tr:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 109, 57, 0.15); border-color: var(--primary); background: #2a2f40;}
        .table-custom tbody td { border: none; padding: 20px; border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: 600; color: var(--text-muted); vertical-align: middle; }
        .table-custom tbody td:first-child { border-left: 1px solid rgba(255,255,255,0.02); border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .table-custom tbody td:last-child { border-right: 1px solid rgba(255,255,255,0.02); border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .btn-action { width: 35px; height: 35px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; border: none; transition: 0.2s; margin-left: 5px; background: var(--border-color); color: var(--text-main);}
        .btn-edit:hover { background: var(--primary); color: white; }
        .btn-delete:hover { background: #e53e3e; color: white; }

        .badge-stock { padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .stock-in { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
        .stock-low { background: rgba(250, 204, 21, 0.1); color: #facc15; }
        .stock-out { background: rgba(248, 113, 113, 0.1); color: #f87171; }

        .btn-primary-gaming { background: var(--primary); color: white; border: none; font-weight: 800; transition: 0.3s;}
        .btn-primary-gaming:hover { background: #e85b28; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 109, 57, 0.3);}

        .modal-content { background: var(--surface); border: 1px solid var(--border-color); color: var(--text-main); }
        .form-control, .form-select { background: var(--border-color); border: 1px solid var(--border-color); color: white !important; }
        .form-control:focus, .form-select:focus { background: #2a2f40; border-color: var(--primary); color: white; box-shadow: 0 0 0 3px rgba(255, 109, 57, 0.2); }
        .form-label { color: var(--text-muted); }
        .new-cat-box { background: var(--border-color); border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; margin-top: 10px; display: none;}
    
        .top-header, .card-custom, .amz-order-card, .dashboard-card, .sidebar, .offcanvas {
            background: var(--surface) !important;
        }
    
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">
<body>

<header class="admin-header">
    <a class="brand-logo" href="index.html"><i class="bi bi-controller"></i> SS STORE</a>

    <ul class="nav-menu">
        <li><a href="index.html" class="nav-link"><i class="bi bi-shop me-2"></i> Store</a></li>
        <li><a href="admin-products.html" class="nav-link active"><i class="bi bi-tag me-2"></i> Products</a></li>
        <li><a href="admin-orders.html" class="nav-link"><i class="bi bi-cart me-2"></i> Orders</a></li>
        <li><a href="admin-users.html" class="nav-link"><i class="bi bi-people me-2"></i> Customers</a></li>
        <li><a href="admin-coupons.html" class="nav-link"><i class="bi bi-ticket-perforated me-2"></i> Coupons</a></li>
        <li><a href="admin-reports.html" class="nav-link"><i class="bi bi-bar-chart me-2"></i> Analytics</a></li>
        <li><a href="admin-feedback.html" class="nav-link text-white fw-bold">
            <i class="bi bi-chat-left-dots me-2"></i> Feedback Reports
        </a></li>
    </ul>

    <a href="login.html" class="btn btn-outline-danger fw-bold rounded-pill px-4" onclick="localStorage.clear();"><i class="bi bi-box-arrow-left me-2"></i> Sign Out</a>
</header>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="fw-extrabold m-0 text-white" style="font-weight: 900; letter-spacing: 1px;">INVENTORY</h2>
            <p class="small m-0 mt-1" style="color: var(--text-muted);">Manage and add new gear to your armory</p>
        </div>
        <button class="btn btn-primary-gaming rounded-pill px-4 py-2" onclick="openAddModal()">
            <i class="bi bi-plus-lg me-2"></i> Add New Product
        </button>
    </div>

    <div class="dashboard-container">
        <!-- Category Filters -->
        <div class="d-flex gap-2 mb-3 overflow-auto" id="adminCategoryTabs" style="padding-bottom: 5px;">
            <!-- Rendered via JS -->
        </div>

        <div class="table-responsive">
            <table class="table-custom" id="productsTable">
                <thead><tr><th>ID</th><th>Product Info</th><th>Category</th><th>Price</th><th>Stock</th><th class="text-end pe-4">Actions</th></tr></thead>
                <tbody id="productsBody"><tr><td colspan="6" class="text-center py-5" style="color: var(--text-muted);">Loading armory...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content" style="border-radius: 24px; background: #161210; border: 1px solid rgba(255, 109, 57, 0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
            <div class="modal-header border-0 p-4 pb-0">
                <h4 class="modal-title fw-bold text-white d-flex align-items-center gap-2" id="modalTitle" style="font-weight: 900; letter-spacing: 1px;"><i class="bi bi-box-seam" style="color: var(--primary); font-size: 1.5rem;"></i> <span>NEW GEAR</span></h4>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 p-md-5">
                <form id="productForm" onsubmit="saveProduct(event)">
                    <div class="row g-4">
                        <div class="col-md-12"><label class="form-label small fw-bold text-uppercase text-secondary"><i class="bi bi-controller me-1"></i> Product Name *</label><input type="text" class="form-control form-control-lg rounded-4 fs-6" id="pName" placeholder="e.g. Razer DeathAdder V3 Pro" required style="background: rgba(0,0,0,0.3);"></div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase text-secondary mb-2"><i class="bi bi-tag me-1"></i> Category *</label>
                            <select class="form-select form-select-lg rounded-4 fs-6" id="pCat" onchange="handleCategoryChange()" required style="background: rgba(0,0,0,0.3);"><option value="" disabled selected>Loading...</option></select>
                            <div id="newCategoryDiv" class="new-cat-box mt-2 p-3 rounded-4" style="background: rgba(255, 104, 3, 0.05); border: 1px dashed rgba(255,109,57,0.3);"><label class="small fw-bold mb-2" style="color: var(--primary);">Create New Category</label><div class="input-group"><input type="text" class="form-control rounded-start-pill border-secondary" id="newCatName" placeholder="Category name..."><button class="btn btn-primary-gaming fw-bold rounded-end-pill px-4" type="button" onclick="saveNewCategory()">Add</button></div></div>
                        </div>
                        <div class="col-md-6" id="subCatRow" style="display:none;">
                            <label class="form-label small fw-bold text-uppercase mb-2" style="color:#60a5fa;" id="subCatLabel"><i class="bi bi-diagram-2 me-1"></i> Sub-Category</label>
                            <select class="form-select form-select-lg rounded-4 fs-6" id="pSubCat" onchange="handleSubCatChange()" style="background: rgba(0,0,0,0.3); border-color: rgba(96,165,250,0.3);">
                                <option value="">-- Select Sub-Category --</option>
                            </select>
                            <div id="newSubCatDiv" class="new-cat-box mt-2 p-3 rounded-4" style="background: rgba(96,165,250,0.05); border: 1px dashed rgba(96,165,250,0.3);">
                                <label class="small fw-bold mb-2" style="color: #60a5fa;">Create New Sub-Category</label>
                                <div class="input-group">
                                    <input type="text" class="form-control rounded-start-pill border-secondary" id="newSubCatName" placeholder="e.g. Webcams, Controllers...">
                                    <button class="btn fw-bold rounded-end-pill px-4" type="button" style="background:#3b82f6; color:white;" onclick="saveNewSubCategory()">Add</button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4"><label class="form-label small fw-bold text-uppercase text-secondary"><i class="bi bi-currency-rupee me-1"></i> Price (₹) *</label><input type="number" class="form-control form-control-lg rounded-4 fs-6" id="pPrice" placeholder="0.00" required style="background: rgba(0,0,0,0.3);"></div>
                        <div class="col-md-4"><label class="form-label small fw-bold text-uppercase text-secondary"><i class="bi bi-percent me-1"></i> Discount (%)</label><input type="number" class="form-control form-control-lg rounded-4 fs-6" id="pDisc" value="0" placeholder="0" style="background: rgba(0,0,0,0.3);"></div>
                        <div class="col-md-4"><label class="form-label small fw-bold text-uppercase text-secondary"><i class="bi bi-box-fill me-1"></i> Stock Qty *</label><input type="number" class="form-control form-control-lg rounded-4 fs-6" id="pStock" placeholder="0" required style="background: rgba(0,0,0,0.3);"></div>
                        <div class="col-12"><label class="form-label small fw-bold text-uppercase text-secondary"><i class="bi bi-card-text me-1"></i> Description *</label><textarea class="form-control rounded-4 fs-6 p-3" id="pDesc" rows="4" placeholder="Detailed product specifications..." required style="background: rgba(0,0,0,0.3);"></textarea></div>
                        <div class="col-12 p-4 rounded-4" style="background: rgba(255,109,57,0.03); border: 1px solid rgba(255, 104, 3, 0.1);"><label class="form-label small fw-bold text-uppercase mb-2" style="color: var(--primary);"><i class="bi bi-images me-1"></i> Image URLs *</label><textarea class="form-control rounded-3 fs-6 p-3 text-light border-0" id="pImages" rows="2" placeholder="https://image1.jpg, https://image2.jpg" required style="background: rgba(0,0,0,0.4);"></textarea></div>
                    </div>
                    <div class="mt-4 pt-3 text-end" style="border-top: 1px solid var(--border-color);">
                        <button type="button" class="btn btn-dark rounded-pill px-5 py-3 fw-bold" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-gaming rounded-pill px-5 py-3 fw-bold shadow-lg" id="submitBtn">Publish Gear <i class="bi bi-arrow-right ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const productModal = new bootstrap.Modal(document.getElementById('productModal')); let editingProductId = null;
    let allAdminProducts = [];
    let currentAdminCat = 'all';

    window.onload = function() { fetchProducts(); fetchCategories(); };
    function openAddModal() { editingProductId = null; document.getElementById('productForm').reset(); document.getElementById('modalTitle').innerHTML = '<i class="bi bi-box-seam" style="color: var(--primary); font-size: 1.5rem;"></i> <span>NEW GEAR</span>'; document.getElementById('submitBtn').innerHTML = 'Publish Gear <i class="bi bi-arrow-right ms-2"></i>'; document.getElementById('subCatRow').style.display = 'none'; document.getElementById('newCategoryDiv').style.display = 'none'; document.getElementById('newSubCatDiv').style.display = 'none'; productModal.show(); }

    function fetchProducts() {
        fetch('http://localhost:8080/api/products').then(res => res.json()).then(products => {
            allAdminProducts = products;
            buildAdminCategoryTabs();
            renderAdminProducts();
        });
    }

    function buildAdminCategoryTabs() {
        const tabsContainer = document.getElementById('adminCategoryTabs');
        const categories = [...new Set(allAdminProducts.map(p => p.category || 'General'))];
        
        let html = `<button class="btn btn-sm ${currentAdminCat === 'all' ? 'btn-primary-gaming' : 'btn-outline-secondary text-white border-0'} rounded-pill px-3 py-1 fw-bold" onclick="filterAdminProducts('all')">All Gear</button>`;
        
        categories.forEach(cat => {
            html += `<button class="btn btn-sm ${currentAdminCat === cat ? 'btn-primary-gaming' : 'btn-outline-secondary text-white border-0'} rounded-pill px-3 py-1 fw-bold" onclick="filterAdminProducts('${cat}')">${cat}</button>`;
        });
        
        tabsContainer.innerHTML = html;
    }

    function filterAdminProducts(cat) {
        currentAdminCat = cat;
        buildAdminCategoryTabs();
        renderAdminProducts();
    }

    function renderAdminProducts() {
        const body = document.getElementById('productsBody'); body.innerHTML = '';
        
        let filtered = allAdminProducts;
        if (currentAdminCat !== 'all') {
            filtered = allAdminProducts.filter(p => (p.category || 'General') === currentAdminCat);
        }

        if (filtered.length === 0) return body.innerHTML = `<tr><td colspan="6" class="text-center py-5" style="color: var(--text-muted);">No gear found in this category.</td></tr>`;
        
        filtered.forEach(p => {
            let stockClass = p.stockQuantity > 20 ? 'stock-in' : (p.stockQuantity > 0 ? 'stock-low' : 'stock-out'); let stockText = p.stockQuantity > 0 ? `${p.stockQuantity} in stock` : 'Out of stock';
            body.innerHTML += `
                <tr onclick="window.location.href='index.html?id=${p.id}'">
                    <td class="small fw-bold" style="color: var(--text-muted);">#${p.id}</td>
                    <td class="d-flex align-items-center">
                        <img src="${p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/50'}" alt="${p.name}" class="rounded-3 me-3" style="width: 50px; height: 50px; object-fit: contain; background: var(--border-color); border: 1px solid var(--border-color); padding: 3px;">
                        <div><div class="fw-bold fs-6 text-white">${p.name}</div><div class="small" style="color: var(--text-muted); max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p.description}</div></div>
                    </td>
                    <td class="small fw-bold" style="color: var(--text-muted);">${p.category || 'General'}${p.subCategory ? ' > ' + p.subCategory : ''}</td>
                    <td class="fw-bold text-white fs-6">₹${p.price.toFixed(2)}</td>
                    <td><span class="badge-stock ${stockClass}">${stockText}</span></td>
                    <td class="text-end pe-4" onclick="event.stopPropagation();">
                        <button class="btn-action btn-edit" title="Edit" onclick="editProduct(${p.id})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn-action btn-delete" title="Delete" onclick="deleteProduct(${p.id})"><i class="bi bi-trash3"></i></button>
                    </td>
                </tr>`;
        });
    }

    function editProduct(id) {
        fetch(`http://localhost:8080/api/products/${id}`).then(res => res.json()).then(p => {
            editingProductId = p.id; document.getElementById('pName').value = p.name; document.getElementById('pCat').value = p.category || '';
            document.getElementById('pPrice').value = p.price; document.getElementById('pDisc').value = p.discountPercent || 0;
            document.getElementById('pStock').value = p.stockQuantity; document.getElementById('pDesc').value = p.description;
            document.getElementById('pImages').value = p.images ? p.images.join(', ') : '';
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square" style="color: var(--primary); font-size: 1.5rem;"></i> <span>EDIT GEAR</span>';
            document.getElementById('submitBtn').innerHTML = 'Update Gear <i class="bi bi-check2-circle ms-2"></i>';
            handleCategoryChange();
            if(p.category && (p.category.toLowerCase() === 'accessories' || p.category.toLowerCase() === 'laptop') && p.subCategory) {
                populateSubCatSelect(p.category.toLowerCase(), p.subCategory);
            }
            productModal.show();
        }).catch(err => alert("Error fetching data!"));
    }
    function deleteProduct(id) { if(confirm("Delete gear #" + id + "?")) { fetch(`http://localhost:8080/api/products/${id}`, { method: 'DELETE' }).then(res => { if(res.ok) fetchProducts(); }); } }
    function fetchCategories(selectAfterLoad = "") { const catSelect = document.getElementById('pCat'); fetch('http://localhost:8080/api/categories').then(res => res.json()).then(categories => { catSelect.innerHTML = '<option value="" disabled selected>Select Category</option>'; categories.forEach(cat => catSelect.innerHTML += `<option value="${cat.name}">${cat.name}</option>`); catSelect.innerHTML += `<option value="ADD_NEW" style="color:var(--primary); font-weight:bold;">âž• Add New Category...</option>`; if(selectAfterLoad !== "") { catSelect.value = selectAfterLoad; handleCategoryChange(); } }); }
    
    function handleCategoryChange() {
        const val = document.getElementById('pCat').value;
        document.getElementById('newCategoryDiv').style.display = val === 'ADD_NEW' ? 'block' : 'none';
        if(val === 'ADD_NEW') document.getElementById('newCatName').focus();
        
        const subRow = document.getElementById('subCatRow');
        if(val && (val.toLowerCase() === 'accessories' || val.toLowerCase() === 'laptop')) {
            subRow.style.display = 'block';
            populateSubCatSelect(val.toLowerCase());
        } else {
            subRow.style.display = 'none';
            document.getElementById('pSubCat').value = '';
        }
    }

    function populateSubCatSelect(catType, selectVal = '') {
        const defaultAccessorieSubs = ['Keyboards', 'Mouse', 'Mousepads', 'Controllers', 'Webcams', 'USB Hubs', 'Cables']; const defaultLaptopSubs = ['i5', 'i7', 'i9','AMD Ryzen 5','AMD Ryzen 7','AMD Ryzen 9'];
        let subs = []; let catLabel = 'Sub-Category'; if (catType === 'accessories') { subs = JSON.parse(localStorage.getItem('accessories_sub_categories') || 'null') || defaultAccessorieSubs; catLabel = 'Accessories Sub-Category'; } else if (catType === 'laptop') { subs = JSON.parse(localStorage.getItem('laptop_sub_categories') || 'null') || defaultLaptopSubs; catLabel = 'Laptop Sub-Category'; } document.getElementById('subCatLabel').innerHTML = `<i class="bi bi-diagram-2 me-1"></i> ${catLabel}`;
        const sel = document.getElementById('pSubCat');
        sel.innerHTML = '<option value="">-- Select Sub-Category --</option>';
        subs.forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
        sel.innerHTML += `<option value="ADD_NEW_SUB" style="color:#60a5fa; font-weight:bold;">Create New Sub-Category...</option>`;
        if(selectVal) sel.value = selectVal;
    }

    function handleSubCatChange() {
        const val = document.getElementById('pSubCat').value;
        document.getElementById('newSubCatDiv').style.display = val === 'ADD_NEW_SUB' ? 'block' : 'none';
        if(val === 'ADD_NEW_SUB') document.getElementById('newSubCatName').focus();
    }

    function saveNewSubCategory() {
        const name = document.getElementById('newSubCatName').value.trim();
        if(!name) return;
        const catType = document.getElementById('pCat').value.toLowerCase(); let storageKey = ''; let defaultSubs = [];
        if (catType === 'accessories') { storageKey = 'accessories_sub_categories'; defaultSubs = ['Keyboards', 'Mouse', 'Mousepads', 'Controllers', 'Webcams', 'USB Hubs', 'Cables']; } else if (catType === 'laptop') { storageKey = 'laptop_sub_categories'; defaultSubs = ['i5', 'i7', 'i9','AMD Ryzen 5','AMD Ryzen 7','AMD Ryzen 9']; } else return;
        let subs = JSON.parse(localStorage.getItem(storageKey) || 'null') || defaultSubs; if(!subs.includes(name)) subs.push(name);
        localStorage.setItem(storageKey, JSON.stringify(subs));
        document.getElementById('newSubCatName').value = '';
        document.getElementById('newSubCatDiv').style.display = 'none';
        populateSubCatSelect(catType, name);
        alert(`"${name}" added to sub-categories!`);
    }

    function saveNewCategory() { const newCatName = document.getElementById('newCatName').value.trim(); if(!newCatName) return; fetch('http://localhost:8080/api/categories', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: newCatName }) }).then(res => res.json()).then(savedCat => { document.getElementById('newCategoryDiv').style.display = 'none'; document.getElementById('newCatName').value = ''; fetchCategories(savedCat.name); }); }
    function saveProduct(e) { e.preventDefault(); if(document.getElementById('pCat').value === 'ADD_NEW') return alert("Save new category first!"); const btn = document.getElementById('submitBtn'); const originalText = btn.innerHTML; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Processing...'; btn.disabled = true; const imgArray = document.getElementById('pImages').value.split(',').map(url => url.trim()).filter(url => url !== ""); const subCatVal = document.getElementById('pSubCat').value; const data = { name: document.getElementById('pName').value, category: document.getElementById('pCat').value, subCategory: (subCatVal && subCatVal !== 'ADD_NEW_SUB') ? subCatVal : null, price: parseFloat(document.getElementById('pPrice').value), discountPercent: parseFloat(document.getElementById('pDisc').value) || 0, stockQuantity: parseInt(document.getElementById('pStock').value), description: document.getElementById('pDesc').value, images: imgArray }; const apiUrl = editingProductId ? `http://localhost:8080/api/products/${editingProductId}` : 'http://localhost:8080/api/products'; const apiMethod = editingProductId ? 'PUT' : 'POST'; fetch(apiUrl, { method: apiMethod, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }).then(res => { if(res.ok) { document.getElementById('productForm').reset(); editingProductId = null; productModal.hide(); fetchProducts(); } }).finally(() => { btn.innerHTML = originalText; btn.disabled = false; }); }
</script>
