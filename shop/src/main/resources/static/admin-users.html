<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Customers | S/S GearZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>

        :root {
            --bg-color: #0B0501;
            --surface: #161210;
            --surface-raised: #1e1a18;
            --primary: #FF6803;
            --primary-hover: #AE3A02;
            --text-main: #FFFFFF;
            --text-muted: #BFBFBF;
            --border-color: #2a2420;
        }

        
        /* theme.css applied */
        body {
            background-color: var(--bg-color) !important;
            background: var(--bg-color) !important;
            background-attachment: fixed !important;
            font-family: 'Inter', sans-serif !important;
            color: var(--text-muted) !important;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(255, 104, 3, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(174, 58, 2, 0.1) 0%, transparent 50%),
                        rgba(11, 5, 1, 0.85);
            z-index: -1;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

        .admin-header { background: var(--surface); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .nav-menu { display: flex; gap: 15px; align-items: center; margin: 0; padding: 0; list-style: none; }
        .nav-link { padding: 10px 20px; border-radius: 30px; font-weight: 800; color: var(--text-muted); transition: 0.3s; text-decoration: none; font-size: 0.95rem; }
        .nav-link:hover { background: rgba(255, 104, 3, 0.1); color: var(--primary); transform: translateY(-2px); }
        .nav-link.active { background: var(--primary); color: var(--text-main); box-shadow: 0 5px 15px rgba(255, 109, 57, 0.3); }

        .main-content { padding: 40px; min-height: 100vh; max-width: 1400px; margin: 0 auto; }
        .dashboard-container { background: var(--surface); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid var(--border-color); padding: 30px; margin-top: 30px;}

        .table-custom { border-collapse: separate; border-spacing: 0 10px; width: 100%; color: var(--text-main);}
        .table-custom thead th { border: none; font-weight: 800; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; padding: 15px 20px; }
        .table-custom tbody tr { background: var(--border-color); transition: 0.3s; }
        .table-custom tbody tr:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 109, 57, 0.15); background: #2a2f40;}
        .table-custom tbody td { border: none; padding: 20px; border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: 600; color: var(--text-muted); vertical-align: middle; }
        .table-custom tbody td:first-child { border-left: 1px solid rgba(255,255,255,0.02); border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .table-custom tbody td:last-child { border-right: 1px solid rgba(255,255,255,0.02); border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; font-size: 1.2rem;}
        .btn-primary-gaming { background: transparent; color: var(--primary); border: 1px solid var(--primary); font-weight: 800; transition: 0.3s;}
        .btn-primary-gaming:hover { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 109, 57, 0.3);}
    
        .top-header, .card-custom, .amz-order-card, .dashboard-card, .sidebar, .offcanvas {
            background: var(--surface) !important;
        }
    
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">
<body>

<header class="admin-header">
    <a class="brand-logo" href="index.html"><i class="bi bi-controller"></i> SS STORE</a>
    <ul class="nav-menu">
        <li><a href="index.html" class="nav-link"><i class="bi bi-shop me-2"></i> Store</a></li>
        <li><a href="admin-products.html" class="nav-link"><i class="bi bi-tag me-2"></i> Products</a></li>
        <li><a href="admin-orders.html" class="nav-link"><i class="bi bi-cart me-2"></i> Orders</a></li>
        <li><a href="admin-users.html" class="nav-link active"><i class="bi bi-people me-2"></i> Customers</a></li>
        <li><a href="admin-coupons.html" class="nav-link"><i class="bi bi-ticket-perforated me-2"></i> Coupons</a></li>
        <li><a href="admin-reports.html" class="nav-link"><i class="bi bi-bar-chart me-2"></i> Analytics</a></li>
        <li><a href="admin-feedback.html" class="nav-link text-white fw-bold">
            <i class="bi bi-chat-left-dots me-2"></i> Feedback Reports
        </a></li>
    </ul>
    <a href="login.html" class="btn btn-outline-danger fw-bold rounded-pill px-4" onclick="localStorage.clear();"><i class="bi bi-box-arrow-left me-2"></i> Sign Out</a>
</header>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="fw-extrabold m-0 text-white" style="font-weight: 900; letter-spacing: 1px;">CUSTOMERS</h2>
            <p class="small m-0 mt-1" style="color: var(--text-muted);">Manage user access and details</p>
        </div>
        <button class="btn btn-primary-gaming rounded-pill px-4 py-2" onclick="loadUsers()"><i class="bi bi-arrow-clockwise me-2"></i> Refresh List</button>
    </div>

    <div class="dashboard-container">
        <div class="table-responsive">
            <table class="table-custom">
                <thead><tr><th>Profile</th><th>Email</th><th>Role</th><th>Status</th><th class="text-end pe-4">Action</th></tr></thead>
                <tbody id="userTableBody"><tr><td colspan="5" class="text-center py-5" style="color: var(--text-muted);">Loading gamers...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem("role") !== "ADMIN") window.location.href = "login.html";
    function loadUsers() {
        fetch('http://localhost:8080/api/users').then(res => res.json()).then(users => {
            const tb = document.getElementById('userTableBody'); tb.innerHTML = '';
            users.forEach(user => {
                const colors = ['var(--primary)', '#38b2ac', '#d69e2e', '#e53e3e', '#805ad5'];
                const color = colors[user.id % colors.length];
                const initial = user.name ? user.name.charAt(0).toUpperCase() : '?';
                
                let avatarHtml = user.profilePic ? 
                    `<img src="${user.profilePic}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid ${color};">` : 
                    `<div class="avatar-circle" style="background-color: ${color};">${initial}</div>`;

                let role = user.role === 'ADMIN' ? `<span class="badge" style="background: var(--border-color); color:var(--text-main);">ADMIN</span>` : `<span class="badge" style="background: rgba(255,255,255,0.02); border:1px solid var(--border-color); color:var(--text-muted);">USER</span>`;
                let status = user.active ? `<span class="badge" style="background: rgba(74, 222, 128, 0.1); color: #4ade80;"><i class="bi bi-check-circle me-1"></i> Active</span>` : `<span class="badge" style="background: rgba(248, 113, 113, 0.1); color: #f87171;"><i class="bi bi-slash-circle me-1"></i> Blocked</span>`;
                let btn = user.role === 'ADMIN' ? `<span class="small fw-bold text-uppercase" style="color: var(--text-muted);"><i class="bi bi-shield-lock-fill"></i> System</span>` : (user.active ? `<button class="btn btn-sm btn-outline-danger fw-bold rounded-3" onclick="toggleStatus(${user.id})">Block</button>` : `<button class="btn btn-sm btn-outline-success fw-bold rounded-3" onclick="toggleStatus(${user.id})">Unblock</button>`);

                tb.innerHTML += `<tr>
                    <td><div class="d-flex align-items-center gap-3">${avatarHtml}<div class="fw-bold fs-6 text-white">${user.name}</div></div></td>
                    <td class="fw-bold" style="color: var(--text-muted);">${user.email}</td><td>${role}</td><td>${status}</td><td class="text-end pe-4">${btn}</td>
                </tr>`;
            });
        });
    }
    function toggleStatus(id) { if(confirm("Change access?")) { fetch(`http://localhost:8080/api/users/${id}/toggle-status`, { method: 'PUT' }).then(res => { if (res.ok) loadUsers(); }); } }
    loadUsers();
</script>
<script src="scroll-animations.js" defer></script>

</html>
