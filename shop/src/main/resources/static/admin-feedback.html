<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Feedback | S/S GearZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>

        :root {
            --bg-color: #0B0501;
            --surface: #161210;
            --surface-raised: #1e1a18;
            --primary: #FF6803;
            --primary-hover: #AE3A02;
            --text-main: #FFFFFF;
            --text-muted: #BFBFBF;
            --border-color: #2a2420;
        }

        
        /* theme.css applied */
        body {
            background-color: var(--bg-color) !important;
            background: var(--bg-color) !important;
            background-attachment: fixed !important;
            font-family: 'Inter', sans-serif !important;
            color: var(--text-muted) !important;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(255, 104, 3, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(174, 58, 2, 0.1) 0%, transparent 50%),
                        rgba(11, 5, 1, 0.85);
            z-index: -1;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

        .admin-header { background: var(--surface); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .nav-menu { display: flex; gap: 15px; align-items: center; margin: 0; padding: 0; list-style: none; }
        .nav-link { padding: 10px 20px; border-radius: 30px; font-weight: 800; color: var(--text-muted); transition: 0.3s; text-decoration: none; font-size: 0.95rem; }
        .nav-link:hover { background: rgba(255, 104, 3, 0.1); color: var(--primary); transform: translateY(-2px); }
        .nav-link.active { background: var(--primary) !important; color: var(--text-main) !important; box-shadow: 0 5px 15px rgba(255, 109, 57, 0.3); }

        .main-content { padding: 40px; min-height: 100vh; max-width: 1400px; margin: 0 auto; }
        .dashboard-container { background: var(--surface); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid var(--border-color); padding: 30px; margin-top: 20px;}

        .table-custom { border-collapse: separate; border-spacing: 0 10px; width: 100%; color: var(--text-main);}
        .table-custom thead th { border: none; font-weight: 800; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; padding: 15px 20px; }
        .table-custom tbody tr { background: var(--border-color); transition: 0.3s; }
        .table-custom tbody tr:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 104, 3, 0.1); background: #2a2f40;}
        .table-custom tbody td { border: none; padding: 20px; font-weight: 600; color: var(--text-muted); vertical-align: middle; }
        .table-custom tbody td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .table-custom tbody td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .feedback-badge { border: 2px dashed var(--text-muted); padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;}
        .badge-bug { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .badge-suggestion { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .badge-other { border-color: #f59e0b; color: #f59e0b; background: rgba(245, 158, 11, 0.1); }

        .form-select { background: var(--border-color); border: 1px solid var(--border-color); color: white; border-radius: 10px; padding: 8px 15px; }
        .btn-action { width: 35px; height: 35px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; border: none; transition: 0.2s; background: var(--border-color); color: var(--text-main);}
        .btn-delete:hover { background: #e53e3e; color: white; }
        .msg-text { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-size: 0.9rem; }
    
        .top-header, .card-custom, .amz-order-card, .dashboard-card, .sidebar, .offcanvas {
            background: var(--surface) !important;
        }
    
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">
<body>

<header class="admin-header">
    <a class="brand-logo" href="index.html"><i class="bi bi-controller"></i> SS STORE</a>
    <ul class="nav-menu">
        <li><a href="admin-products.html" class="nav-link"><i class="bi bi-tag me-2"></i> Products</a></li>
        <li><a href="admin-orders.html" class="nav-link"><i class="bi bi-cart me-2"></i> Orders</a></li>
        <li><a href="admin-users.html" class="nav-link"><i class="bi bi-people me-2"></i> Customers</a></li>
        <li><a href="admin-coupons.html" class="nav-link"><i class="bi bi-ticket-perforated me-2"></i> Coupons</a></li>
        <li><a href="admin-feedback.html" class="nav-link active"><i class="bi bi-chat-left-dots me-2"></i> Feedback</a></li>
    </ul>
    <a href="login.html" class="btn btn-outline-danger fw-bold rounded-pill px-4" onclick="localStorage.clear();">Sign Out</a>
</header>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="fw-black m-0 text-white" style="font-weight: 900; letter-spacing: 1px;">FEEDBACK REPORTS</h2>
            <p class="small m-0 mt-1 text-secondary">Review transmissions from users</p>
        </div>
        <select class="form-select w-auto fw-bold" id="filterCategory" onchange="loadFeedback()">
            <option value="all">All Categories</option>
            <option value="bug">Bugs</option>
            <option value="suggestion">Suggestions</option>
            <option value="other">Other</option>
        </select>
    </div>

    <div class="dashboard-container">
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                <tr>
                    <th>Category</th>
                    <th>User Info</th>
                    <th>Message Preview</th>
                    <th>Timestamp</th>
                    <th class="text-end pe-4">Action</th>
                </tr>
                </thead>
                <tbody id="feedbackTableBody">
                <tr><td colspan="5" class="text-center py-5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="msgModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: var(--surface); border: 1px solid var(--primary); color: white;">
            <div class="modal-header border-0 pb-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body pt-2">
                <h5 class="fw-bold mb-1" style="color:var(--primary);">Message Content</h5>
                <p class="small text-secondary mb-3" id="modalUserName"></p>
                <p id="fullMsgContent" style="line-height:1.6;"></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (localStorage.getItem("role") !== "ADMIN") window.location.href = "login.html";

    async function loadFeedback() {
        const tb = document.getElementById('feedbackTableBody');
        const catFilter = document.getElementById('filterCategory').value;
        
        try {
            const res = await fetch('http://localhost:8080/api/feedback');
            let allFeedback = await res.json();

            let filtered = allFeedback.filter(f => catFilter === 'all' || f.type === catFilter);

            if (filtered.length === 0) {
                tb.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-secondary">No feedback entries found.</td></tr>`;
                return;
            }

            // Backend already sends in descending order usually, but let's just map it as is
            tb.innerHTML = filtered.map((f) => {
                let badgeClass = `badge-${f.type}`;
                let dName = (f.userName && f.userName !== 'null' && f.userName !== 'undefined') ? f.userName : 'Unknown';
                return `
                    <tr>
                        <td><span class="feedback-badge ${badgeClass}">${f.type}</span></td>
                        <td>
                            <div class="fw-bold text-white">${dName}</div>
                            <div class="small text-secondary" style="font-size:0.75rem;">${f.userEmail}</div>
                        </td>
                        <td><div class="msg-text" onclick="viewMsg('${dName.replace(/'/g, "\\'")}', '${f.message.replace(/'/g, "\\'")}')" style="cursor:pointer;">${f.message}</div></td>
                        <td class="small text-secondary">${f.date || 'Recently'}</td>
                        <td class="text-end pe-4">
                            <button class="btn-action btn-delete" onclick="deleteFeedback(${f.id})"><i class="bi bi-trash3"></i></button>
                        </td>
                    </tr>`;
            }).join('');
        } catch (error) {
            console.error("Error loading feedback:", error);
            tb.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-danger">Error loading feedback from server.</td></tr>`;
        }
    }

    function viewMsg(userName, msg) {
        let titleEl = document.getElementById('modalUserName');
        if(titleEl) {
            titleEl.innerText = "From: " + userName;
        }

        document.getElementById('fullMsgContent').innerText = msg;
        new bootstrap.Modal(document.getElementById('msgModal')).show();
    }

    async function deleteFeedback(id) {
        if(!confirm("Delete this report forever?")) return;
        try {
            const res = await fetch(`http://localhost:8080/api/feedback/${id}`, {
                method: 'DELETE'
            });
            if(res.ok) {
                loadFeedback();
            } else {
                alert("Failed to delete feedback.");
            }
        } catch (error) {
            console.error("Error deleting feedback:", error);
            alert("Error deleting feedback.");
        }
    }

    window.onload = loadFeedback;
</script>
<script src="scroll-animations.js" defer></script>

</html>
