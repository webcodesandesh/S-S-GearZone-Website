<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information - S.S STORE</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        :root {
            --bg-color: #0B0501;
            --surface: #161210;
            --surface-raised: #1e1a18;
            --primary: #FF6803;
            --primary-hover: #AE3A02;
            --text-main: #FFFFFF;
            --text-muted: #BFBFBF;
            --border-color: #2a2420;
        }

        
        /* theme.css applied */
        body {
            background-color: var(--bg-color) !important;
            background: var(--bg-color) !important;
            background-attachment: fixed !important;
            font-family: 'Inter', sans-serif !important;
            color: var(--text-muted) !important;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(255, 104, 3, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(174, 58, 2, 0.1) 0%, transparent 50%),
                        rgba(11, 5, 1, 0.85);
            z-index: -1;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }

        .navbar-premium { background: var(--surface); border-bottom: 1px solid var(--border-color); padding: 15px 0; }
        .brand-logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;}

        .premium-card { background: var(--surface); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); padding: 40px; margin-top: 20px; margin-bottom: 40px;}

        .page-title { font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;}
        .content-area { color: var(--text-muted); font-size: 1.05rem; line-height: 1.8; font-weight: 500;}
        .content-area h4 { color: var(--text-main); font-weight: 800; margin-top: 25px; margin-bottom: 15px;}
        .content-area ul { margin-bottom: 20px; }
        .content-area li { margin-bottom: 10px; }

        .footer { background: #0a0b0f; border-top: 1px solid var(--border-color); padding: 40px 0 20px 0; margin-top: auto; text-align: center; color: #718096; font-weight: bold; font-size: 0.85rem;}
    
        .top-header, .card-custom, .amz-order-card, .dashboard-card, .sidebar, .offcanvas {
            background: var(--surface) !important;
        }
    
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">

        <div class="header-icons d-flex align-items-center">

        </div>
    </div>
</header>

<div class="container flex-grow-1" style="max-width: 900px;">
    <div class="premium-card">
        <h1 class="page-title" id="infoTitle">Loading Intel...</h1>
        <div class="content-area" id="infoContent">
            <div class="text-center py-5 text-muted"><div class="spinner-border text-primary" style="color: var(--primary) !important;" role="status"></div></div>
        </div>
    </div>
</div>

<footer class="footer">

</footer>

<script>
    // SS STORE Information Database
    const pageData = {
        "about": {
            title: "About Us",
            content: `
                <h4>Built By Gamers, For Gamers</h4>
                <p>Welcome to SS STORE, your ultimate destination for premium gaming hardware and accessories. We started in 2026 with a single mission: to provide the gaming community in India with top-tier, reliable, and hardcore gaming gear without the ridiculous markups.</p>
                <p>Whether you are building your first PC, upgrading your mechanical keyboard, or looking for that 240Hz Ultrawide advantage, our armory is always stocked with the best.</p>
                <h4>Our Mission</h4>
                <ul>
                    <li>100% Genuine and authenticated products.</li>
                    <li>Lightning-fast drops (deliveries) across the country.</li>
                    <li>24/7 Support from real gamers, not bots.</li>
                </ul>`
        },
        "delivery": {
            title: "Delivery Information",
            content: `
                <h4>How We Drop Your Gear</h4>
                <p>We know that waiting for new hardware is the hardest part. That's why SS STORE partners with the fastest logistics networks to ensure your gear arrives intact and on time.</p>
                <h4>Shipping Times</h4>
                <ul>
                    <li><strong>Metro Cities:</strong> 1 - 2 Business Days (Express Drop)</li>
                    <li><strong>Tier 2 Cities:</strong> 3 - 4 Business Days</li>
                    <li><strong>Remote Locations:</strong> 5 - 7 Business Days</li>
                </ul>
                <h4>Tracking</h4>
                <p>Once your order is dispatched, a tracking radar link will be deployed to your registered email and phone number. You can also track your package live from the 'My Orders' section.</p>`
        },
        "privacy": {
            title: "Privacy Policy",
            content: `
                <h4>Your Data is Secured</h4>
                <p>At SS STORE, we treat your personal information like top-secret intel. We use industry-standard 256-bit encryption to secure your data and transactions.</p>
                <h4>What we collect</h4>
                <p>We only collect data necessary to fulfill your orders (Name, Drop Address, Contact Comms, and Payment status). We <strong>never</strong> sell your data to third-party advertisers or data brokers.</p>
                <h4>Cookies</h4>
                <p>We use essential cookies to keep your cart loaded and your session active. You can clear these from your browser settings anytime.</p>`
        },
        "terms": {
            title: "Terms & Conditions",
            content: `
                <h4>Rules of Engagement</h4>
                <p>By accessing SS STORE, you agree to abide by these terms. These rules ensure a fair and secure environment for all players (customers).</p>
                <ul>
                    <li><strong>Account Security:</strong> You are responsible for keeping your login credentials secure.</li>
                    <li><strong>Pricing:</strong> All prices are subject to change based on market hardware availability. However, once an order is locked, the price is final.</li>
                    <li><strong>Abuse:</strong> Any attempt to exploit promo codes, fake orders, or harass our support team will result in an immediate hardware ban (Account Termination).</li>
                </ul>`
        },
        "returns": {
            title: "Return Policy",
            content: `
                <h4>7-Day Tactical Return Policy</h4>
                <p>If your gear arrives damaged, dead-on-arrival (DOA), or isn't exactly what you ordered, we've got your back. You can request a return within 7 days of the drop.</p>
                <h4>Conditions for Return</h4>
                <ul>
                    <li>The product must be in its original packaging with all manuals and accessories.</li>
                    <li>Physical damage caused by user error (e.g., rage-quitting and smashing the keyboard) is not covered.</li>
                    <li>A video of unboxing is highly recommended to claim DOA replacements instantly.</li>
                </ul>
                <p>To initiate a return, go to 'My Orders' and click on 'Request Return' or contact our support comms.</p>`
        }
    };

    // Magic Logic: Read URL and display content
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const topic = urlParams.get('topic'); // grabs ?topic=about etc.

        const titleEl = document.getElementById('infoTitle');
        const contentEl = document.getElementById('infoContent');

        if (topic && pageData[topic]) {
            titleEl.innerHTML = `<i class="bi bi-info-square me-2"></i> ` + pageData[topic].title;
            contentEl.innerHTML = pageData[topic].content;
        } else {
            titleEl.innerHTML = "404 - Intel Not Found";
            contentEl.innerHTML = "<p>The information you are looking for has been moved or does not exist.</p>";
        }
    };
</script>
<script src="scroll-animations.js" defer></script>
